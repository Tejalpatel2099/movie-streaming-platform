server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: my-super-secret-key-that-is-at-least-32-chars-long-for-demo
  expiration: 86400000

logging:
  level:
    com.streaming: INFO
    org.hibernate.SQL: WARN
