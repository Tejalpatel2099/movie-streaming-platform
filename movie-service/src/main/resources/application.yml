server:
  port: 8082

spring:
  application:
    name: movie-service
  datasource:
    url: jdbc:h2:mem:moviedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  cache:
    type: simple
  h2:
    console:
      enabled: true
      path: /h2-console
